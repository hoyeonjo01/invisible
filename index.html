  <title>Invisible </title>

<body>
  <h1>Invisible Règles</h1>
  <p>우리는 특정 사회에서 살아가면서 자연스럽게 행동 방식, 시간 개념, 공공 공간에서의 태도, 신체 표현 등 다양한 규칙을 배우게 된다. 이러한 규칙들은 명확하게 적혀 있지 않지만 사회 속에서 반복되며 '당연한 것'으로 인식된다.<br>
  <br>그러나 다른 문화권에 놓이게 되면, 이전까지 자연스럽다고 생각했던 행동들이 낯설어지고 동시에 그 사회에서 또 다른 방식의 규칙이 존재한다는 것을 발견하게 된다.</p>
</body>
</html>
