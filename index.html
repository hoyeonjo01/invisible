    scene:'수업 중 교수님을 부를 때 "Professeur"라고 했는데, 주변 프랑스 친구들은 모두 "Monsieur"라고 부르고 있었다. 나만 직책으로 부르고 있다는 걸 그 순간 처음 알아챘다.',
    rule:'프랑스에서 교수를 "Professeur"라고 부르는 것은 어색하다. 교수도, 의사도, 변호사도 Monsieur/Madame으로 부른다. 직책이 아니라 사람으로 호칭한다.',
    domain:'LANG', observation_method:'경험',
    visibility_score:80, adopted:'수용', adopted_score:65,
    emotional_intensity:'3', frequency:'반복',
    theory_tag:'Hofstede', source_type:'personal',
    color:'#c8c4ec', accent:'#4A46A8', image:null
  },
  {
    id:'FR-039', title:'S\'interrompre, c\'est participer',
    scene:'프랑스 대화 스타일의 가장 큰 특징은 대화 중 끼어드는 것이 허용될 뿐 아니라 오히려 환영받는다는 것이다. 침묵이 길어지면 주제가 재미없다는 신호로 읽힌다.',
    rule:'대화 중 끼어드는 것은 적극적인 참여의 신호다.',
    domain:'LANG', observation_method:'경험',
    visibility_score:60, adopted:'수용', adopted_score:65,
    emotional_intensity:'2', frequency:'반복',
    theory_tag:'Hofstede', source_type:'community',
    color:'#c8c4ec', accent:'#4A46A8', image:null
  }
];

let page='land', bjProg=0, cardEls=[], detTimers=[], hintGone=false;

const blSpans = document.querySelectorAll('.bl');
setTimeout(()=>document.getElementById('land-hint').classList.add('vis'), 3000);

function handleKey(ch){
  if(page!=='land') return;
  const t='bonjour';
  if(ch===t[bjProg]){
    bjProg++;
    blSpans.forEach((el,i)=>el.style.color=i<bjProg?'rgba(0,0,0,0.86)':'rgba(0,0,0,0.08)');
    if(bjProg===7) setTimeout(goMain,650);
  } else if(ch.length===1&&!['shift','control','alt','meta'].includes(ch)){
    bjProg=0;
    blSpans.forEach(el=>el.style.color='rgba(0,0,0,0.08)');
  }
}
document.addEventListener('keydown',e=>handleKey(e.key.toLowerCase()));
document.getElementById('land').addEventListener('click',()=>document.body.focus());

function goMain(){
  page='main';
  document.getElementById('land').classList.add('out');
  initCards(); buildArchive();
}

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

function initCards(){
  const W=window.innerWidth, H=window.innerHeight;
  const PX=Math.max(64,W*0.08), PY=Math.max(56,H*0.1);
  const AW=W-PX*2, AH=H-PY*2;
  const layer=document.getElementById('items-layer');
  layer.innerHTML=''; cardEls=[];
  DATA.forEach(item=>{
    const ox=PX+(item.adopted_score/100)*AW;
    const oy=PY+(1-item.visibility_score/100)*AH;
    const el=document.createElement('div');
    el.className='item'; el.style.left=ox+'px'; el.style.top=oy+'px';
    const img=document.createElement('div'); img.className='i-img';
    if(item.image){
      img.style.background='#e8e4de';
      const pic=document.createElement('img'); pic.src=item.image; pic.alt=item.title;
      img.appendChild(pic);
    } else {
      img.style.background=item.color;
      const dot=document.createElement('div'); dot.className='i-dot'; dot.style.background=item.accent;
      const loc=document.createElement('div'); loc.className='i-loc'; loc.style.color=item.accent;
      loc.textContent=item.scene.slice(0,14)+'…';
      img.appendChild(dot); img.appendChild(loc);
    }
    const txt=document.createElement('div'); txt.className='i-txt';
    const t=document.createElement('span'); t.className='i-title'; t.textContent=item.title;
    t.addEventListener('click',()=>goDetail(item));
    txt.appendChild(t); el.appendChild(img); el.appendChild(txt);
    layer.appendChild(el);
    cardEls.push({item,img,txt});
  });
  applyAdapt(0);
}

function applyAdapt(t){
  cardEls.forEach(d=>{
    const p=clamp(((t-(100-d.item.adopted_score)*0.7))/22,0,1);
    d.img.style.opacity=String(1-p);
    d.txt.style.opacity=String(p);
    p>0.5?d.txt.classList.add('on'):d.txt.classList.remove('on');
  });
  document.getElementById('pbar').style.width=t+'%';
}

document.getElementById('scroll-h').addEventListener('scroll',function(){
  if(!hintGone){hintGone=true;document.getElementById('scroll-hint').style.opacity='0';}
  const max=this.scrollWidth-this.clientWidth;
  applyAdapt(max>0?(this.scrollLeft/max)*100:0);
});
window.addEventListener('resize',()=>{if(page==='main')initCards();});

function goDetail(item){
  page='detail'; detTimers.forEach(clearTimeout); detTimers=[];
  document.getElementById('det-id').textContent=item.id;
  document.getElementById('det-title').textContent=item.title;
  document.getElementById('det-sub').textContent=item.domain+' — '+item.adopted+' — visibility '+item.visibility_score;
  document.getElementById('det-scene').textContent=item.scene;
  document.getElementById('det-rule').textContent=item.rule;
  document.getElementById('det-prox').textContent=item.observation_method;
  document.getElementById('det-source').textContent=item.source_type;
  document.getElementById('det-domain-tags').innerHTML=
    `<span class="tag">${item.domain}</span><span class="tag">${item.frequency}</span>`;
  document.getElementById('det-theory').innerHTML=
    item.theory_tag.split(',').map(t=>`<span class="tag th">${t.trim()}</span>`).join('');
  ['det-title','det-sub','fb-scene','det-sep','fb-rule','fb-domain','fb-prox','fb-source','fb-theory']
    .forEach(id=>document.getElementById(id).style.opacity='0');
  document.getElementById('detail').classList.add('show');
  const seq=[[120,'det-title'],[280,'det-sub'],[500,'fb-scene'],[1600,'det-sep'],[2000,'fb-rule'],[2400,'fb-domain'],[2600,'fb-prox'],[2800,'fb-source'],[3000,'fb-theory']];
  seq.forEach(([ms,id])=>detTimers.push(setTimeout(()=>document.getElementById(id).style.opacity='1',ms)));
}

function buildArchive(){
  const tbody=document.getElementById('arc-tbody');
  tbody.innerHTML='';
  DATA.forEach(item=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td class="arc-num">${item.id}</td>
      <td class="td-title">${item.title}</td>
      <td><span class="tag" style="font-size:7px">${item.domain}</span></td>
      <td class="td-scene">${item.scene.slice(0,30)}…</td>
      <td class="arc-num">${item.visibility_score}</td>
      <td class="arc-num">${item.adopted}</td>
      <td class="arc-num">${item.observation_method}</td>
      <td class="arc-num">${item.emotional_intensity}</td>
      <td class="arc-num">${item.frequency}</td>
      <td style="font-size:8px;color:rgba(0,0,0,0.4)">${item.theory_tag}</td>
      <td class="arc-num">${item.source_type}</td>
    `;
    tr.querySelector('.td-title').addEventListener('click',()=>{closePage('archive');goDetail(item);});
    tbody.appendChild(tr);
  });
}

function openArchive(){page='archive';document.getElementById('archive').classList.add('show');}
function closePage(w){page='main';document.getElementById(w).classList.remove('show');}
</script>
